<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO Kebonsari Malang</title>
<meta name="description" content="Katalog Produk UFO Kebonsari Malang">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9}
#promoBanner{background:#facc15;text-align:center;font-weight:700;overflow:hidden}
#promoBanner img{width:100%;max-height:220px;object-fit:cover;display:block}
.header{background:linear-gradient(135deg,#0077c8,#00a2ff);color:#fff;text-align:center;padding:18px}
.logo{width:80px;height:80px;border-radius:50%;background:#fff;padding:4px}
.search-wrap{display:flex;gap:10px;padding:12px;background:#0077c8;position:sticky;top:0;z-index:50}
.menu-btn{width:48px;border:none;border-radius:12px}
#search{flex:1;padding:12px;border:none;border-radius:30px}
.container{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer}
.card img{width:100%;height:180px;object-fit:contain;padding:10px}
.card-body{padding:10px}.brand{display:inline-block;background:#eef6ff;color:#0077c8;padding:4px 8px;border-radius:999px;font-size:11px}
.tipe{font-weight:600;margin-top:8px;min-height:40px}.harga{color:#e11d48;font-size:20px;font-weight:700}
.status,.unggulan{display:inline-block;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:700;margin:2px}
.baru{background:#dbeafe;color:#2563eb}.promo{background:#fee2e2;color:#dc2626}.best{background:#fef3c7;color:#d97706}.unggulan{background:#fff7ed;color:#ea580c}
.modal{display:none;position:fixed;inset:0;background:#fff;overflow:auto;z-index:9999}.modal-content{padding:20px}
.modal img{width:100%;max-height:350px;object-fit:contain}
.close{font-size:30px;float:right;cursor:pointer}
.btn{display:block;text-align:center;color:#fff;text-decoration:none;padding:14px;border-radius:10px;margin-top:10px;border:none;width:100%;font-weight:700}
.wa{background:#25D366}.share{background:#0077c8}.copy{background:#444}
#sideMenu{position:fixed;left:-300px;top:0;width:300px;height:100%;background:#0077c8;color:#fff;z-index:9999;transition:.3s;overflow:auto}
.menu-item{padding:14px 18px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.1)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998}
.floating-wa{position:fixed;right:20px;bottom:20px;width:60px;height:60px;background:#25D366;color:#fff;text-decoration:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;z-index:9999}
</style>
</head>
<body>

<div id="sideMenu">
<div style="padding:20px;font-weight:700;font-size:18px">UFO Kebonsari</div>
<div class="menu-item" onclick="showHome()">🏠 Beranda</div>
<div class="menu-item" onclick="showPromo()">🔥 Promo Bulan Ini</div>
<div class="menu-item" onclick="showUnggulan()">⭐ Produk Unggulan</div>
<div class="menu-item" onclick="window.open('https://maps.app.goo.gl/oGMAEKaJqjncurwD9')">📍 Lokasi Toko</div>
<div class="menu-item" onclick="window.open('https://wa.me/6289524391002')">📞 Hubungi Kami</div>
<div class="menu-item" onclick="showTentang()">🏪 Tentang Toko</div>
<div style="padding:15px;font-weight:bold">🏷️ Brand Produk</div>
<div id="brandList"></div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div id="promoBanner">🔥 PROMO UFO KEBONSARI</div>
<div class="header">
<h2>UFO Kebonsari Malang</h2>
</div>

<div class="search-wrap">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<input id="search" placeholder="Cari produk...">
</div>

<div id="productCount" style="padding:12px;font-weight:600"></div>
<div id="produk" class="container"></div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="modal.style.display='none'">&times;</span>
<img id="mFoto">
<h2 id="mNama"></h2>
<h3 id="mHarga"></h3>
<div id="mKategori"></div>
<div id="mSpek"></div>
<a id="waBtn" class="btn wa" target="_blank">Tanya via WhatsApp</a>
<button id="shareBtn" class="btn share">📤 Bagikan Produk</button>
<button id="copyBtn" class="btn copy">🔗 Salin Link</button>
</div>
</div>

<a href="https://wa.me/6289524391002" target="_blank" class="floating-wa">💬</a>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";
let semuaProduk=[];

function foto(f){return "https://ufokebonsarimalang.github.io/KATALOGUFOKEBONSARI/images/"+f}
function formatRupiah(n){return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n||0)}
function slugProduk(p){return ((p.brand||"")+"-"+(p.tipe||"")).toLowerCase().replace(/[^a-z0-9]+/g,"-")}

async function loadProduk(){
const res=await fetch(API_URL);
const data=await res.json();

data.sort((a,b)=>{
if(a.unggulan==="YA"&&b.unggulan!=="YA")return -1;
if(a.unggulan!=="YA"&&b.unggulan==="YA")return 1;
return (Number(a.urutan)||999)-(Number(b.urutan)||999);
});

semuaProduk=data;
buatBrandMenu(data);
tampilkan(data);
productCount.innerHTML="📦 Total Produk : "+data.length;

const banner=data.find(x=>x.banner);
if(banner && banner.banner.startsWith("http")){
promoBanner.innerHTML='<img src="'+banner.banner+'">';
}

const slug=new URLSearchParams(location.search).get("produk");
if(slug){
const p=data.find(x=>slugProduk(x)==slug);
if(p)detail(p);
}
}

function tampilkan(data){
produk.innerHTML="";
data.forEach(p=>{
let badge="";
if(p.status==="BARU") badge='<span class="status baru">🆕 BARU</span>';
if(p.status==="PROMO") badge='<span class="status promo">🔥 PROMO</span>';
if(p.status==="BESTSELLER") badge='<span class="status best">⭐ BESTSELLER</span>';
let unggulan=p.unggulan==="YA"?'<span class="unggulan">⭐ UNGGULAN</span>':'';

produk.innerHTML+=`<div class="card" onclick='detail(${JSON.stringify(p)})'>
<img loading="lazy" src="${foto(p.foto)}" onerror="this.src='images/noimage.jpg'">
<div class="card-body">${badge}${unggulan}<div class="brand">${p.brand||""}</div><div class="tipe">${p.tipe||""}</div><div class="harga">${formatRupiah(p.harga)}</div></div></div>`;
});
}

function detail(p){
modal.style.display="block";
document.title=(p.brand||"")+" "+(p.tipe||"")+" | UFO Kebonsari";
history.replaceState({},'',"?produk="+slugProduk(p));
mFoto.src=foto(p.foto);
mNama.innerHTML=(p.brand||"")+" "+(p.tipe||"");
mHarga.innerHTML=formatRupiah(p.harga);
mKategori.innerHTML="<b>Kategori:</b> "+(p.kategori||"-");
mSpek.innerHTML=[p.spek1,p.spek2,p.spek3,p.spek4,p.spek5].filter(Boolean).map(x=>"<div>✅ "+x+"</div>").join("");

const url=location.origin+location.pathname+"?produk="+slugProduk(p);

waBtn.href="https://wa.me/6289524391002?text="+encodeURIComponent("Halo, saya tertarik produk "+mNama.innerText);
shareBtn.onclick=()=>navigator.share?navigator.share({title:mNama.innerText,url:url}):navigator.clipboard.writeText(url);
copyBtn.onclick=()=>{navigator.clipboard.writeText(url);alert("Link produk disalin");}
}

search.addEventListener("keyup",function(){
const k=this.value.toLowerCase();
tampilkan(semuaProduk.filter(p=>(p.brand||"").toLowerCase().includes(k)||(p.tipe||"").toLowerCase().includes(k)||(p.kategori||"").toLowerCase().includes(k)));
});

function buatBrandMenu(data){
const brand=[...new Set(data.map(x=>x.brand).filter(Boolean))].sort();
brandList.innerHTML='<div class="menu-item" onclick="showHome()">Semua Brand</div>';
brand.forEach(b=>brandList.innerHTML+=`<div class="menu-item" onclick="filterBrand('${b.replace(/'/g,'')}')">${b}</div>`);
}

function filterBrand(b){tampilkan(semuaProduk.filter(x=>x.brand===b));closeMenu();}
function showPromo(){tampilkan(semuaProduk.filter(x=>x.status==="PROMO"));closeMenu();}
function showUnggulan(){tampilkan(semuaProduk.filter(x=>x.unggulan==="YA"));closeMenu();}
function showHome(){tampilkan(semuaProduk);closeMenu();}
function showTentang(){alert("UFO Kebonsari Malang merupakan pusat penjualan elektronik yang menyediakan berbagai produk berkualitas seperti TV, AC, kulkas, mesin cuci, audio dan kebutuhan elektronik rumah tangga lainnya.");}
function toggleMenu(){sideMenu.style.left="0";overlay.style.display="block";}
function closeMenu(){sideMenu.style.left="-300px";overlay.style.display="none";}

loadProduk();
</script>
</body>
</html>
