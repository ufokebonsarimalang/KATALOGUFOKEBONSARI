<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog UFO Elektronik</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.header img{width:80px;margin-bottom:10px;}

.search-box{
background:white;
padding:10px;
position:sticky;
top:0;
z-index:10;
}

input,select{
width:48%;
padding:10px;
margin-top:5px;
font-size:14px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{padding:10px;}

.brand{font-size:12px;color:#666;}

.tipe{font-weight:bold;font-size:14px;margin:5px 0;}

.harga{color:red;font-weight:bold;}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
z-index:999;
}

.modal-content{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

.modal img{width:100%;border-radius:10px;}

.close{float:right;font-size:25px;cursor:pointer;}

.wa{
display:block;
background:#25D366;
color:white;
padding:12px;
text-align:center;
margin-top:10px;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
