<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog UFO Elektronik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.search-box{
padding:15px;
background:white;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

#search{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

.container{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.1);
cursor:pointer;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
background:#eee;
}

.card-body{
padding:10px;
}

.brand{
font-size:12px;
color:#666;
font-weight:bold;
}

.tipe{
font-size:14px;
font-weight:bold;
margin-top:5px;
}

.harga{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#e11d48;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
overflow:auto;
z-index:9999;
}

.modal-content{
background:white;
margin:20px;
border-radius:10px;
padding:15px;
}

.modal img{
width:100%;
border-radius:10px;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

.spek div{
padding:5px 0;
}

.wa{
display:block;
margin-top:20px;
background:#25D366;
color:white;
text-align:center;
padding:15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>UFO KEBONSARI MALANG</h1>
<p>Katalog Produk</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Cari produk...">
</div>

<div id="produk" class="container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="tutupModal()">&times;</span>

<img id="mFoto">

<h2 id="mNama"></h2>
<h3 id="mHarga"></h3>

<div id="mKategori"></div>

<div id="mSpek"></div>

<a id="waBtn" class="wa" target="_blank">Tanya via WhatsApp</a>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec;

let semuaProduk = [];

function formatRupiah(n){
return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n || 0);
}

function getImg(file){
return file ? "images/"+file : "";
}

/* ================= LOAD DATA ================= */
async function loadProduk(){

const res = await fetch(API_URL);
const data = await res.json();

semuaProduk = data;

render(semuaProduk);

}

/* ================= RENDER ================= */
function render(data){

const box=document.getElementById("produk");
box.innerHTML="";

data.forEach((p,i)=>{

box.innerHTML += `
<div class="card" onclick="detail(${i})">

<img src="${getImg(p.Foto)}">

<div class="card-body">

<div class="brand">${p.Brand || ""}</div>

<div class="tipe">${p.Tipe || ""}</div>

<div class="harga">${formatRupiah(p.Harga)}</div>

</div>

</div>
`;

});

}

/* ================= DETAIL ================= */
function detail(i){

const p = semuaProduk[i];

document.getElementById("modal").style.display="block";

document.getElementById("mFoto").src = getImg(p.Foto);

document.getElementById("mNama").innerText =
(p.Brand || "") + " " + (p.Tipe || "");

document.getElementById("mHarga").innerText =
formatRupiah(p.Harga);

document.getElementById("mKategori").innerText =
"Kategori : " + (p.Kategori || "");

let spek="";
[p.Spek1,p.Spek2,p.Spek3,p.Spek4,p.Spek5].forEach(s=>{
if(s){
spek += `<div>✅ ${s}</div>`;
}
});

document.getElementById("mSpek").innerHTML = spek;

document.getElementById("waBtn").href =
`https://wa.me/6289524391002?text=Halo saya mau tanya ${p.Brand} ${p.Tipe}`;

}
