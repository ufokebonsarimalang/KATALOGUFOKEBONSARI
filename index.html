<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO Kebonsari Malang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9}

/* HEADER */
.header{background:#0077c8;text-align:center}
.header-banner img{width:100%;display:block}

/* SEARCH */
.search-wrap{
  display:flex;
  gap:10px;
  padding:12px;
  background:#0077c8;
  position:sticky;
  top:0;
  z-index:50;
}
.menu-btn{width:48px;border:none;border-radius:12px}
#search{flex:1;padding:12px;border:none;border-radius:30px}

/* KATEGORI BAR */
#kategoriBar{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px;
  background:#fff;
  white-space:nowrap;
}
#kategoriBar button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}
#kategoriBar button.active{
  background:#0077c8;
  color:#fff;
}

/* PRODUK */
.container{
  padding:8px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
@media(min-width:768px){
  .container{grid-template-columns:repeat(4,1fr);}
}

.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.card-body{padding:8px}
.brand{font-size:11px;color:#0077c8}
.tipe{font-weight:600}
.harga{color:#e11d48;font-weight:700}

/* FOOTER */
.footer{text-align:center;padding:20px;color:#666;font-size:13px}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-banner">
    <img src="images/header-ufo.png">
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <button class="menu-btn">☰</button>
  <input id="search" placeholder="Cari produk...">
</div>

<!-- KATEGORI (FIXED) -->
<div id="kategoriBar">

  <button class="active" onclick="filterKategori('SEMUA')">Semua</button>
  <button onclick="filterKategori('HP')">📱 HP</button>
  <button onclick="filterKategori('LAPTOP')">💻 Laptop</button>
  <button onclick="filterKategori('ELEKTRONIK')">📺 Elektronik</button>
  <button onclick="filterKategori('DAPUR')">🍳 Dapur</button>

</div>

<!-- PRODUK -->
<div id="produk" class="container"></div>

<!-- SCRIPT -->
<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";

let semuaProduk=[];

function loadProduk(){
  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{
    semuaProduk=data.produk||[];
    tampilkan(semuaProduk);
  });
}

function tampilkan(data){
  const el=document.getElementById("produk");
  el.innerHTML="";

  data.forEach(p=>{
    el.innerHTML+=`
    <div class="card">
      <img src="${p.foto}" onerror="this.src='images/noimage.jpg'">
      <div class="card-body">
        <div class="brand">${p.brand||""}</div>
        <div class="tipe">${p.tipe||""}</div>
        <div class="harga">Rp ${p.harga||0}</div>
      </div>
    </div>`;
  });
}

/* FILTER KATEGORI */
function filterKategori(k){

  setActive(k);

  if(k==="SEMUA"){
    tampilkan(semuaProduk);
    return;
  }

  const hasil=semuaProduk.filter(p =>
    (p.kategori||"").toUpperCase().trim()===k
  );

  tampilkan(hasil);
}

/* ACTIVE BUTTON */
function setActive(k){
  document.querySelectorAll("#kategoriBar button").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText.includes(k) || (k==="SEMUA" && btn.innerText==="Semua")){
      btn.classList.add("active");
    }
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
  const q=this.value.toLowerCase();

  tampilkan(
    semuaProduk.filter(p =>
      (p.brand||"").toLowerCase().includes(q) ||
      (p.tipe||"").toLowerCase().includes(q)
    )
  );
});

loadProduk();
</script>

<!-- FOOTER -->
<div class="footer">
© UFO Kebonsari Malang
</div>

</body>
</html>
