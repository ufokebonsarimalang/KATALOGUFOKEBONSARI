<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO Kebonsari Malang</title>
<meta name="description" content="Katalog Produk UFO Kebonsari Malang">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9}

#promoBanner{display:none}

.header{
  background:#0077c8;
  padding:0;
  margin:0;
  text-align:center;
}

.header-banner{width:100%;background:#0077c8}

.header-banner img{
  width:100%;
  display:block;
  border-radius:0 0 18px 18px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

@media (min-width:768px){
  .header-banner img{
    width:60%;
    margin:0 auto;
    display:block;
  }
}

.search-wrap{
  display:flex;
  gap:10px;
  padding:12px;
  background:#0077c8;
  position:sticky;
  top:0;
  z-index:50;
}

.menu-btn{width:48px;border:none;border-radius:12px}
#search{flex:1;padding:12px;border:none;border-radius:30px}

.container{
  padding:8px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

@media(min-width:768px){
  .container{grid-template-columns:repeat(4,1fr);}
}

.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
}

.card-body{padding:8px}

.brand{
  display:inline-block;
  background:#eef6ff;
  color:#0077c8;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
}

.tipe{font-weight:600;margin-top:8px;min-height:40px}
.harga{color:#e11d48;font-size:20px;font-weight:700}

.status,.unggulan{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  margin:2px;
}

.baru{background:#dbeafe;color:#2563eb}
.promo{background:#fee2e2;color:#dc2626}
.best{background:#fef3c7;color:#d97706}
.unggulan{background:#fff7ed;color:#ea580c}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  overflow:auto;
  z-index:9999;
}

.modal-content{padding:20px}
.modal img{width:100%;max-height:350px;object-fit:contain}

#kategoriBar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:12px 10px;
  background:#fff;
  white-space:nowrap;
}

#kategoriBar button{
  flex:0 0 auto;
  padding:10px 16px;
  border:none;
  border-radius:999px;
  background:#f1f5f9;
  cursor:pointer;
}

#kategoriBar button.active{
  background:#0077c8;
  color:#fff;
}
</style>
</head>

<body>

<div id="sideMenu">
<div style="padding:20px;font-weight:700">KATALOG UFO KEBONSARI</div>
<div class="menu-item" onclick="showHome()">🏠 Beranda</div>
<div class="menu-item" onclick="showPromo()">🔥 Promo Bulan Ini</div>
<div class="menu-item" onclick="showUnggulan()">⭐ Produk Unggulan</div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div class="header">
  <div class="header-banner">
    <img src="images/header-ufo.png">
  </div>
</div>

<div class="search-wrap">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<input id="search" placeholder="Cari produk...">
</div>

<div id="kategoriBar">
  <button onclick="filterKategori('SEMUA')">🏠 Semua</button>
  <button onclick="filterKategori('HP')">📱 HP</button>
  <button onclick="filterKategori('LAPTOP')">💻 Laptop</button>
  <button onclick="filterKategori('ELEKTRONIK')">📺 Elektronik</button>
  <button onclick="filterKategori('DAPUR')">🍳 Dapur</button>
</div>

<div id="produk" class="container"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";

let semuaProduk=[];

const foto=f=>"https://ufokebonsarimalang.github.io/KATALOGUFOKEBONSARI/images/"+f;

async function loadProduk(){
  const res=await fetch(API_URL);
  const data=await res.json();
  semuaProduk=data.produk||[];
  tampilkan(semuaProduk);
}

function tampilkan(data){
  produk.innerHTML="";
  data.forEach(p=>{
    produk.innerHTML+=`
      <div class="card">
        <img src="${foto(p.foto)}">
        <div class="card-body">
          <div class="brand">${p.brand||""}</div>
          <div class="tipe">${p.tipe||""}</div>
        </div>
      </div>
    `;
  });
}

function filterKategori(k){
  if(k==="SEMUA"){
    tampilkan(semuaProduk);
    return;
  }

  tampilkan(
    semuaProduk.filter(p =>
      (p.kategori||"").toUpperCase() === k
    )
  );
}

function showHome(){tampilkan(semuaProduk);}
function showPromo(){tampilkan(semuaProduk);}
function showUnggulan(){tampilkan(semuaProduk);}

loadProduk();
</script>

</body>
</html>
