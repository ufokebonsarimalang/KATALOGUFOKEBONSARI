<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Elektronik - Katalog</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.header img{
width:80px;
margin-bottom:10px;
}

.search-box{
padding:10px;
background:white;
position:sticky;
top:0;
z-index:10;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#search{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

.filters{
display:flex;
gap:10px;
padding:10px;
background:white;
flex-wrap:wrap;
}

select{
padding:10px;
flex:1;
min-width:120px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.brand{
font-size:12px;
color:#666;
}

.tipe{
font-weight:bold;
margin-top:5px;
}

.harga{
color:#e11d48;
font-weight:bold;
margin-top:8px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:9999;
overflow:auto;
}

.modal-content{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

.modal img{
width:100%;
border-radius:10px;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}

.spek div{
padding:4px 0;
}

.wa{
display:block;
background:#25D366;
color:white;
text-align:center;
padding:12px;
margin-top:15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="images/logo.png" onerror="this.style.display='none'">
<h1>UFO KEBONSARI MALANG</h1>
<p>Katalog Produk</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Cari produk...">
</div>

<div class="filters">
<select id="filterKategori">
<option value="">Semua Kategori</option>
</select>

<select id="filterBrand">
<option value="">Semua Brand</option>
</select>
</div>

<div id="produk" class="container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="tutupModal()">&times;</span>

<img id="mFoto">

<h2 id="mNama"></h2>
<h3 id="mHarga"></h3>

<div id="mKategori"></div>

<div id="mSpek"></div>

<a id="waBtn" class="wa" target="_blank">Tanya WhatsApp</a>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzqDhY5nu8KBLMggsRrDuo9gxcUrEpFrfqhnb6UnDyrpR6KG2aUh46Jk5kliW3xG2yH/exec";

let semuaProduk = [];
let filterKategori = "";
let filterBrand = "";
let keyword = "";

function formatRupiah(n){
return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n || 0);
}

function img(n){
return n ? "images/"+n : "";
}

async function loadProduk(){

try{

const res = await fetch(API_URL);
const data = await res.json();

semuaProduk = data || [];

tampilkan(data);

}catch(e){
document.getElementById("produk").innerHTML =
"<h3 style='text-align:center'>Gagal load data</h3>";
}
}

function tampilkan(data){

const box=document.getElementById("produk");
box.innerHTML="";

data.forEach((p,i)=>{

box.innerHTML += `
<div class="card" onclick="detail(${i})">

<img src="${img(p.foto)}">

<div class="card-body">

<div class="brand">${p.brand||""}</div>

<div class="tipe">${p.tipe||""}</div>

<div class="harga">${formatRupiah(p.harga)}</div>

</div>

</div>
`;

});

semuaProduk = data;
isiFilter(data);
}

function isiFilter(data){

const kSet = new Set();
const bSet = new Set();

data.forEach(p=>{
if(p.kategori) kSet.add(p.kategori);
if(p.brand) bSet.add(p.brand);
});

const k = document.getElementById("filterKategori");
const b = document.getElementById("filterBrand");

k.innerHTML = `<option value="">Semua Kategori</option>`;
b.innerHTML = `<option value="">Semua Brand</option>`;

kSet.forEach(v=>{
k.innerHTML += `<option value="${v}">${v}</option>`;
});

bSet.forEach(v=>{
b.innerHTML += `<option value="${v}">${v}</option>`;
});

}

function applyFilter(){

let hasil = semuaProduk.filter(p=>{

return (
(!filterKategori || p.kategori == filterKategori) &&
(!filterBrand || p.brand == filterBrand) &&
(
(p.brand||"").toLowerCase().includes(keyword) ||
(p.tipe||"").toLowerCase().includes(keyword)
)
);

});

render(hasil);
}

function render(data){

const box=document.getElementById("produk");
box.innerHTML="";

data.forEach((p,i)=>{

box.innerHTML += `
<div class="card" onclick
