/* STYLE POPUP MODAL SUBKATEGORI DI TENGAH LAYAR */
.popup-sub-modal {

  overflow: hidden;
  animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
  from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
.popup-sub-header {
  padding: 16px 20px;

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";
let semuaProduk=[];
let settingData={};
let bannerData=[];
let promoData=[];
let produkAktif = null;
let kategoriAktif = "SEMUA";
let subKategoriAktif = "SEMUA";

const foto = f => {
  if (!f) return "images/noimage.jpg";
  return "images/" + f;
};
const rupiah=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n||0);
const slug=p=>((p.brand||"")+"-"+(p.tipe||"")).toLowerCase().replace(/[^a-z0-9]+/g,"-");

function aktifkanFullScreen() {
  const docEl = document.documentElement;
  if (docEl.requestFullscreen) {
    docEl.requestFullscreen();
  } else if (docEl.webkitRequestFullscreen) {
    docEl.webkitRequestFullscreen();
  } else if (docEl.msRequestFullscreen) {
    docEl.msRequestFullscreen();
  }
}

async function loadProduk(){
 try{
  const cache = localStorage.getItem("ufo_cache_v1");
  if(cache){
    const c = JSON.parse(cache);
    semuaProduk = c.data?.produk || [];
    settingData = c.data?.setting || {};
    bannerData = c.data?.banner || [];
    promoData = c.data?.promo || [];
    renderSetting();
    updateFloatingWA();
    renderBanner();
    buatBrandMenu(semuaProduk);
    buatKategori(semuaProduk);
    tampilkan(semuaProduk);

    const params = new URLSearchParams(window.location.search);
    const slugProduk = params.get("produk");
    if (slugProduk){
      const produk = semuaProduk.find(p=>slug(p)===slugProduk);
      if(produk) detail(produk);
    }
  }

  const res=await fetch(API_URL);
  const data=await res.json();

  localStorage.setItem("ufo_cache_v1", JSON.stringify({
    time: Date.now(),
    data: data
  }));

  semuaProduk = data.produk || [];
  settingData = data.setting || {};
  bannerData = data.banner || [];
  promoData = data.promo || [];
  renderSetting();
  renderBanner();
  buatBrandMenu(semuaProduk);
  buatKategori(semuaProduk);
  tampilkan(semuaProduk);

 }catch(err){
  console.error(err);
 }
}

/* FUNGSI SUBKATEGORI POPUP - TANPA TOMBOL SEMUA & FORMAT TITLE CASE */
function buatSubKategori(kategori){
  if(kategori==="SEMUA"){
    tutupPopupSub();
    return;
  }

  const daftar = [
    ...new Set(
      semuaProduk
        .filter(p => String(p.kategori||"").trim().toUpperCase() === kategori.toUpperCase())
        .map(p => String(p.subKategori||"").trim())
        .filter(Boolean)
    )
  ].sort();

  if(daftar.length===0){
    tutupPopupSub();
    return;
  }

  // Mengubah teks judul menjadi rapi, misal: Sub Kategori Elektronik
  let namaKategoriRapih = kategori.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById("popupSubTitle").innerText = "Sub Kategori " + namaKategoriRapih;
  
  const body = document.getElementById("popupSubBody");
  body.innerHTML = "";

  let html = "";

  // Render langsung murni daftar subkategorinya saja
  daftar.forEach(s => {
    let subRapih = s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    html += `
      <button class="popup-sub-item" onclick="eksekusiFilter('${kategori}', '${s}')">
        <span>🔹 ${subRapih}</span>
        <span>❯</span>
      </button>
    `;
  });

  body.innerHTML = html;

  document.getElementById("overlay").style.display = "block";
  document.getElementById("popupSubMenu").style.display = "block";
}

function eksekusiFilter(kategori, subKategori) {
  let hasil = semuaProduk.filter(p => String(p.kategori||"").trim().toUpperCase() === kategori.toUpperCase());
  if(subKategori !== "SEMUA"){
    hasil = hasil.filter(p => String(p.subKategori||"").trim().toUpperCase() === subKategori.toUpperCase());
  }
  tampilkan(hasil);
  tutupPopupSub();
}

function tutupPopupSub() {
  document.getElementById("popupSubMenu").style.display = "none";
  if (sideMenu.style.left !== "0px") {
    document.getElementById("overlay").style.display = "none";
  }
}

function tutupSemuaOverlay() {
  closeMenu();
  tutupPopupSub();
}

function tampilkan(data){
  let html = "";
  data.forEach(p=>{
    let badge = "";
    if(p.status==="BARU") badge='<span class="status baru">🆕BARU</span>';
    if(p.status==="PROMO") badge='<span class="status promo">🔥PROMO</span>';
    if(p.status==="BESTSELLER") badge='<span class="status best">⭐BESTSELLER</span>';

    let unggulan = p.unggulan==="YA" ? '<span class="unggulan">⭐UNGGULAN</span>' : '';

    html += `
    <div class="card" onclick='detail(${JSON.stringify(p)})'>
      <img loading="lazy" src="${foto(p.foto)}" onerror="this.onerror=null;this.src='images/noimage.jpg'">
      <div class="card-body">
        <div class="brand">${p.brand||""}</div>
        <div class="tipe">${p.tipe||""}</div>
        <div class="badge-area">${badge}${unggulan}</div>
        <div style="color:#0077c8;font-size:14px;font-weight:700;margin-top:10px;">➡️ Lihat Detail</div>
      </div>
    </div>
    `;
  });
  produk.innerHTML = html;
}

function showPromo(){
 let html = `<div class="info-box"><h2>🔥 Promo Bulan Ini</h2>`;
 if(promoData.length==0){
   html += `<div style="text-align:center;padding:30px;color:#777;">Belum ada promo bulan ini.</div>`;
 }else{
   promoData.forEach(p=>{
     html += `
     <div style="margin-bottom:25px;">
     <img src="${p.gambar}" alt="${p.judul}" style="width:100%;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.12);cursor:pointer;">
     <div style="margin-top:10px;font-size:18px;font-weight:700;">${p.judul}</div>
     </div>
     `;
   });
 }
 if(settingData.promo){
   html += `<div style="margin-top:20px;white-space:pre-line;line-height:1.7;">${settingData.promo}</div>`;
 }
 html += `</div>`;
 produk.innerHTML = html;
 closeMenu();
}

function showTentang(){
 produk.innerHTML=`<div class="info-box"><h2>🏪 Tentang Toko</h2><p>${settingData.tentang||"-"}</p></div>`;
 closeMenu();
}

function showHome(){tampilkan(semuaProduk);closeMenu();}
function showUnggulan(){tampilkan(semuaProduk.filter(x=>x.unggulan==="YA"));closeMenu();}

function detail(p){
  produkAktif = p;
  updateFloatingWA();
  modal.style.display="block";
  history.replaceState({}, "", "?produk=" + encodeURIComponent(slug(p))); 
  mFoto.src=foto(p.foto);
  mNama.innerHTML=(p.brand||"")+" "+(p.tipe||"");

  mHarga.innerHTML=`
  <div style="color:#16a34a;font-size:22px;font-weight:700;">💬 Hubungi Admin</div>
  <div style="font-size:13px;color:#666;margin-top:8px;line-height:1.6;">
  Harga tidak ditampilkan pada katalog ini.<br>Silakan hubungi kami untuk mendapatkan informasi harga, stok, dan promo terbaru.
  </div>
  `;

  mBrand.innerHTML = p.brand || "-";
  mKategori.innerHTML = p.kategori || "-";
  mSubKategori.innerHTML = p.subKategori || "-";
  mSpek.innerHTML=[p.spek1,p.spek2,p.spek3,p.spek4,p.spek5].filter(Boolean).map(x=>"<div>✔ "+x+"</div>").join("");

  let related = semuaProduk.filter(x => x.tipe !== p.tipe && x.brand === p.brand && x.subKategori === p.subKategori);
  if (related.length < 4) {
    const tambahan = semuaProduk.filter(x => x.tipe !== p.tipe && x.subKategori === p.subKategori && !related.includes(x));
    related = related.concat(tambahan);
  }
  if (related.length < 4) {
    const tambahan = semuaProduk.filter(x => x.tipe !== p.tipe && x.kategori === p.kategori && !related.includes(x));
    related = related.concat(tambahan);
  }
  related = related.slice(0,4);
  mRelated.innerHTML = "";
  related.forEach(item=>{
    mRelated.innerHTML += `<div class="related-item" onclick='detail(${JSON.stringify(item)})'>📦 ${item.brand} ${item.tipe}</div>`;
  });

  const url = window.location.origin + window.location.pathname + "?produk=" + encodeURIComponent(slug(p));
  shareBtn.onclick = async () => {
    try {
      await navigator.share({ title: mNama.innerText, text: "Lihat produk ini di UFO Kebonsari Malang", url: url });
    } catch (err) {}
  };
}

function buatBrandMenu(data){

 brand.forEach(b=>brandList.innerHTML+=`<div class="menu-item" onclick="tampilkan(semuaProduk.filter(x=>x.brand==='${b}'));closeMenu()">${b}</div>`);
}

function buatKategori(data){
  const bar = document.getElementById("kategoriBar");
  if(!bar) return;
  const daftar = ["SEMUA", ...new Set(data.map(x => (x.kategori || "").trim()).filter(Boolean))];
  bar.innerHTML = "";
  daftar.forEach((k,index)=>{
    const btn = document.createElement("button");
    let formatKategori = k === "SEMUA" ? "🏠 Semua" : k.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    btn.textContent = formatKategori;
    if(index===0){ btn.classList.add("active"); }
    btn.onclick = function(){ filterKategori(k,this); };
    bar.appendChild(btn);
  });
}

function filterKategori(k, el = null) {
  document.querySelectorAll('#kategoriBar button').forEach(btn => btn.classList.remove('active'));
  if (el) el.classList.add('active');
  let hasil = [];
  if (k === "SEMUA") { hasil = semuaProduk; } 
  else { hasil = semuaProduk.filter(p => String(p.kategori || "").toUpperCase() === k.toUpperCase()); }
  buatSubKategori(k);
  tampilkan(hasil);
}

function cekPassword(){
  const pass = document.getElementById("passInput").value;
  document.getElementById("loadingLogin").style.display = "block";

  fetch(API_URL + "?password=" + encodeURIComponent(pass))
    .then(r => r.json())
    .then(data => {
      document.getElementById("loadingLogin").style.display = "none";
      if(data.success){
        localStorage.setItem("ufo_login","true");
        aktifkanFullScreen();
        setTimeout(() => {
          location.reload();
        }, 300);
      }else{
        document.getElementById("loginError").innerHTML = "Password Salah";
      }
    })
    .catch(() => {
      document.getElementById("loadingLogin").style.display = "none";
      document.getElementById("loginError").innerHTML = "Gagal Verifikasi";
    });
}
