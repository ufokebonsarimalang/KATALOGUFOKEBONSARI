<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO Kebonsari Malang</title>
<meta name="description" content="Katalog Produk UFO Kebonsari Malang">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9}

/* HEADER */
.header{text-align:center}
.header-banner img{
  width:100%;
  display:block;
  border-radius:0 0 18px 18px;
}

/* SEARCH */
.search-wrap{
  display:flex;
  gap:10px;
  padding:12px;
  background:#0077c8;
  position:sticky;
  top:0;
  z-index:50;
}
.menu-btn{
  width:48px;
  border:none;
  border-radius:12px;
}
#search{
  flex:1;
  padding:12px;
  border:none;
  border-radius:30px;
}

/* KATEGORI */
#kategoriBar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:12px 10px;
  background:#fff;
  white-space:nowrap;
}
#kategoriBar button{
  flex:0 0 auto;
  padding:10px 16px;
  border:none;
  border-radius:999px;
  background:#f1f5f9;
  font-family:Poppins;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}
#kategoriBar button.active{
  background:linear-gradient(135deg,#0077c8,#00a6ff);
  color:#fff;
}

/* PRODUK */
.container{
  padding:8px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
@media(min-width:768px){
  .container{grid-template-columns:repeat(4,1fr);}
}

.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.card-body{padding:8px}
.brand{background:#eef6ff;color:#0077c8;padding:4px 8px;border-radius:999px;font-size:11px}
.tipe{font-weight:600;margin-top:8px}
.harga{color:#e11d48;font-weight:700}

/* MENU */
#sideMenu{
  position:fixed;
  left:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#0077c8;
  color:#fff;
  transition:.3s;
  z-index:9999;
}
.menu-item{
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  z-index:9998;
}

/* FLOAT WA */
.floating-wa{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu">
  <div style="padding:20px;font-weight:700">KATALOG UFO KEBONSARI</div>
  <div class="menu-item" onclick="showHome()">🏠 Beranda</div>
  <div class="menu-item" onclick="showPromo()">🔥 Promo</div>
  <div class="menu-item" onclick="showUnggulan()">⭐ Unggulan</div>
  <div class="menu-item" onclick="hubungiKami()">📞 Kontak</div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-banner">
    <img src="images/header-ufo.png">
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <input id="search" placeholder="Cari produk...">
</div>

<!-- KATEGORI -->
<div id="kategoriBar">
  <button onclick="filterKategori('SEMUA',this)">🏠 Semua</button>
  <button onclick="filterKategori('HP',this)">📱 HP</button>
  <button onclick="filterKategori('LAPTOP',this)">💻 Laptop</button>
  <button onclick="filterKategori('ELEKTRONIK',this)">📺 Elektronik</button>
  <button onclick="filterKategori('DAPUR',this)">🍳 Dapur</button>
</div>

<!-- BANNER -->
<div id="bannerArea"></div>

<!-- PRODUK -->
<div id="produk" class="container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="modal.style.display='none'">&times;</span>
    <img id="mFoto">
    <h2 id="mNama"></h2>
    <h3 id="mHarga"></h3>
    <div id="mKategori"></div>
    <div id="mSpek"></div>
    <button id="shareBtn">📤 Share</button>
  </div>
</div>

<!-- WA -->
<a id="floatingWA" class="floating-wa">💬</a>

<!-- FOOTER -->
<div class="footer">
  © UFO Kebonsari Malang • 2020-2026
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";

let semuaProduk=[],settingData={},bannerData=[];

const sideMenu=document.getElementById("sideMenu");
const overlay=document.getElementById("overlay");

function toggleMenu(){
  sideMenu.style.left="0";
  overlay.style.display="block";
}

function closeMenu(){
  sideMenu.style.left="-300px";
  overlay.style.display="none";
}

function tampilkan(data){
  produk.innerHTML="";
  data.forEach(p=>{
    produk.innerHTML+=`
    <div class="card">
      <img src="${p.foto}">
      <div class="card-body">
        <div class="brand">${p.brand||""}</div>
        <div class="tipe">${p.tipe||""}</div>
        <div class="harga">${p.harga||0}</div>
      </div>
    </div>`;
  });
}

function filterKategori(k,el){
  document.querySelectorAll("#kategoriBar button").forEach(b=>b.classList.remove("active"));
  if(el) el.classList.add("active");

  if(k==="SEMUA"){
    tampilkan(semuaProduk);
    return;
  }

  tampilkan(semuaProduk.filter(p=>p.kategori===k));
}

function showHome(){tampilkan(semuaProduk);closeMenu();}
function showPromo(){closeMenu();}
function showUnggulan(){closeMenu();}
function hubungiKami(){window.open("https://wa.me/628");}

fetch(API_URL)
.then(r=>r.json())
.then(d=>{
  semuaProduk=d.produk;
  tampilkan(semuaProduk);
});
</script>

</body>
</html>
