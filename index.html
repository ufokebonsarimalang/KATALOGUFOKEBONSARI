}

.card{

}

.card img{

}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:999;
}

.modal-content{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

.modal img{
width:100%;
border-radius:10px;
}

.close{
float:right;

}

.wa{
