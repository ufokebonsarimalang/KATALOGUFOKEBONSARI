<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog UFO</title>

<style>
body{margin:0;font-family:Arial;background:#fff;}

.header{
text-align:center;
padding:20px;
background:#fff;
border-bottom:1px solid #ddd;
}

.header img{width:70px;}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
border:1px solid #eee;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{padding:10px;}

.brand{font-size:12px;color:#666;}
.tipe{font-weight:bold;margin:5px 0;}
.harga{color:red;font-weight:bold;}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:#fff;
margin:20px;
padding:15px;
border-radius:10px;
}

.modal img{width:100%;}

.close{float:right;font-size:25px;cursor:pointer;}

.wa{
display:block;
background:#25D366;
color:#fff;
padding:12px;
text-align:center;
margin-top:10px;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
<img src="images/logo.png">
<h2>UFO ELEKTRONIK</h2>
</div>

<div class="container" id="produk"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="tutup()">&times;</span>

<img id="mFoto">
<h3 id="mNama"></h3>
<h3 id="mHarga"></h3>

<a id="waBtn" class="wa" target="_blank">Chat WhatsApp</a>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzqDhY5nu8KBLMggsRrDuo9gxcUrEpFrfqhnb6UnDyrpR6KG2aUh46Jk5kliW3xG2yH/exec";

let data = [];

function img(n){
return "images/"+n;
}

async function load(){
let res = await fetch(API);
data = await res.json();

let box = document.getElementById("produk");
box.innerHTML = "";

data.forEach((p,i)=>{

box.innerHTML += `
<div class="card" onclick="detail(${i})">
<img src="${img(p.foto)}">
<div class="card-body">
<div class="brand">${p.brand}</div>
<div class="tipe">${p.tipe}</div>
<div class="harga">${p.harga}</div>
</div>
</div>
`;

});

window.list = data;
}

function detail(i){

let p = window.list[i];

document.getElementById("modal").style.display="block";

document.getElementById("mFoto").src = img(p.foto);
document.getElementById("mNama").innerText = p.brand+" "+p.tipe;
document.getElementById("mHarga").innerText = p.harga;

document.getElementById("waBtn").href =
"https://wa.me/628XXXXXXXXXX?text=Min saya mau tanya "+p.brand+" "+p.tipe;
}

function tutup(){
document.getElementById("modal").style.display="none";
}

load();

</script>

</body>
</html>
