<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzqDhY5nu8KBLMggsRrDuo9gxcUrEpFrfqhnb6UnDyrpR6KG2aUh46Jk5kliW3xG2yH/exec";

let semuaProduk = [];

function formatRupiah(n){
try{
return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n || 0);
}catch(e){
return "Rp 0";
}
}

function imgPath(file){
return file ? "images/"+file : "";
}

async function loadProduk(){

try{

const res = await fetch(API_URL);
const data = await res.json();

if(!Array.isArray(data)){
document.getElementById("produk").innerHTML =
"<h3>Data API tidak valid</h3>";
return;
}

semuaProduk = data;
tampilkan(data);

}catch(err){
console.log(err);
document.getElementById("produk").innerHTML =
"<h3>Gagal load data (cek API)</h3>";
}
}

function tampilkan(data){

const box = document.getElementById("produk");
box.innerHTML = "";

if(!data || data.length === 0){
box.innerHTML = "<h3>Tidak ada produk</h3>";
return;
}

data.forEach((p,i)=>{

if(!p) return;

box.innerHTML += `
<div class="card" onclick="detail(${i})">

<img src="${imgPath(p.foto)}">

<div class="card-body">

<div class="brand">${p.brand || ""}</div>

<div class="tipe">${p.tipe || ""}</div>

<div class="harga">${formatRupiah(p.harga)}</div>

</div>

</div>
`;

});

semuaProduk = data;
}

function detail(i){

const p = semuaProduk[i];

if(!p) return;

document.getElementById("modal").style.display="block";

document.getElementById("mFoto").src = imgPath(p.foto);
document.getElementById("mNama").innerText = (p.brand || "")+" "+(p.tipe || "");
document.getElementById("mHarga").innerText = formatRupiah(p.harga);
document.getElementById("mKategori").innerText = "Kategori : "+(p.kategori || "");

let spek = "";

[p.spek1,p.spek2,p.spek3,p.spek4,p.spek5].forEach(s=>{
if(s) spek += "<div>✅ "+s+"</div>";
});

document.getElementById("mSpek").innerHTML = spek;

document.getElementById("waBtn").href =
"https://wa.me/6289524391002?text=Halo saya mau tanya "+(p.brand||"")+" "+(p.tipe||"");
}

function tutupModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("search").addEventListener("keyup",function(){

const key = this.value.toLowerCase();

const hasil = semuaProduk.filter(p=>{

return (
(p.brand||"").toLowerCase().includes(key) ||
(p.tipe||"").toLowerCase().includes(key) ||
(p.kategori||"").toLowerCase().includes(key)
);

});

tampilkan(hasil);

});

loadProduk();

</script>
