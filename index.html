<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Elektronik Kebonsari Malang - Katalog Produk</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.search-box{
padding:15px;
background:white;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

#search{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

/* FILTER BAR BARU */
.filters{
display:flex;
gap:10px;
padding:10px;
background:white;
flex-wrap:wrap;
}

select{
flex:1;
min-width:120px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.1);
cursor:pointer;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
background:#eee;
}

.card-body{
padding:10px;
}

.brand{
font-size:12px;
color:#666;
font-weight:bold;
}

.tipe{
font-size:14px;
font-weight:bold;
margin-top:5px;
min-height:40px;
}

.harga{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#e11d48;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
overflow:auto;
z-index:9999;
}

.modal-content{
background:white;
margin:20px;
border-radius:10px;
padding:15px;
}

.modal img{
width:100%;
border-radius:10px;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

.spek{
margin-top:15px;
}

.spek div{
padding:5px 0;
}

.wa{
display:block;
margin-top:20px;
background:#25D366;
color:white;
text-align:center;
padding:15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>UFO KEBONSARI MALANG</h1>
<p>Katalog Produk</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Cari produk...">
</div>

<!-- FILTER BAR -->
<div class="filters">
<select id="filterKategori">
<option value="">Semua Kategori</option>
</select>

<select id="filterBrand">
<option value="">Semua Brand</option>
</select>
</div>

<div id="produk" class="container"></div>

<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="tutupModal()">&times;</span>

<img id="mFoto">

<h2 id="mNama"></h2>

<h3 id="mHarga"></h3>

<div id="mKategori"></div>

<div id="mSpek" class="spek"></div>

<a id="waBtn" class="wa" target="_blank">
Tanya via WhatsApp
</a>

</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzqDhY5nu8KBLMggsRrDuo9gxcUrEpFrfqhnb6UnDyrpR6KG2aUh46Jk5kliW3xG2yH/exec";

let semuaProduk = [];
let filterKategori = "";
let filterBrand = "";

function formatRupiah(n){
return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n);
}

function convertDrive(namaFile){
if(!namaFile) return "";
return "https://ufokebonsarimalang.github.io/KATALOGUFOKEBONSARI/images/" + namaFile;
}

/* ================= LOAD ================= */
async function loadProduk(){

const res = await fetch(API_URL);
const data = await res.json();

semuaProduk = data;

tampilkan(data);
isiFilter(data);
}

/* ================= TAMPIL ================= */
function tampilkan(data){

const box=document.getElementById("produk");
box.innerHTML="";

data.forEach(p=>{

box.innerHTML += `
<div class="card"
onclick='detail(${JSON.stringify(p)})'>

<img src="${convertDrive(p.foto)}">

<div class="card-body">

<div class="brand">${p.brand}</div>

<div class="tipe">${p.tipe}</div>

<div class="harga">
${formatRupiah(p.harga)}
</div>

</div>

</div>
`;

});
}

/* ================= FILTER ISI ================= */
function isiFilter(data){

const kSet = new Set();
const bSet = new Set();

data.forEach(p=>{
if(p.kategori) kSet.add(p.kategori);
if(p.brand) bSet.add(p.brand);
});

const k = document.getElementById("filterKategori");
const b = document.getElementById("filterBrand");

k.innerHTML = `<option value="">Semua Kategori</option>`;
b.innerHTML = `<option value="">Semua Brand</option>`;

kSet.forEach(v=>{
k.innerHTML += `<option value="${v}">${v}</option>`;
});

bSet.forEach(v=>{
b.innerHTML += `<option value="${v}">${v}</option>`;
});

}

/* ================= FILTER ================= */
function applyFilter(){

let hasil = semuaProduk.filter(p=>{

return (
(!filterKategori || p.kategori == filterKategori) &&
(!filterBrand || p.brand == filterBrand) &&
(
(p.brand||"").toLowerCase().includes(
document.getElementById("search").value.toLowerCase()
) ||
(p.tipe||"").toLowerCase().includes(
document.getElementById("search").value.toLowerCase()
)
)
);

});

tampilkan(hasil);
}

/* ================= DETAIL ================= */
function detail(p){

document.getElementById("modal").style.display="block";

document.getElementById("mFoto").src=convertDrive(p.foto);

document.getElementById("mNama").innerHTML=
p.brand+" "+p.tipe;

document.getElementById("mHarga").innerHTML=
formatRup
