<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO Kebonsari Malang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9}

/* HEADER */
.header{
  background:#0077c8;
}

.header-banner img{
  width:100%;
  display:block;
  border-radius:0 0 18px 18px;
}

/* SEARCH */
.search-wrap{
  display:flex;
  gap:10px;
  padding:12px;
  background:#0077c8;
  position:sticky;
  top:0;
  z-index:50;
}

.menu-btn{width:48px;border:none;border-radius:12px}
#search{flex:1;padding:12px;border:none;border-radius:30px}

/* GRID */
.container{
  padding:8px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

@media(min-width:768px){
  .container{grid-template-columns:repeat(4,1fr);}
}

.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.card-body{padding:8px}
.brand{display:inline-block;background:#eef6ff;color:#0077c8;padding:4px 8px;border-radius:999px;font-size:11px}
.tipe{font-weight:600;margin-top:8px;min-height:40px}
.harga{color:#e11d48;font-size:20px;font-weight:700}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:#fff;overflow:auto;z-index:9999}
.modal-content{padding:20px}
.modal img{width:100%;max-height:350px;object-fit:contain}
.close{font-size:30px;cursor:pointer;float:right}

/* ACTION BUTTONS */
.action-btn{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn{
  width:42px;
  height:42px;
  border-radius:12px;
  border:none;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.btn.active{
  background:#4ade80;
  color:white;
}

.btn:active{transform:scale(0.95)}

/* INFO */
.info-box{
  grid-column:1/-1;
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.footer{
  text-align:center;
  padding:20px;
  color:#666;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-banner">
    <img src="images/header-ufo.png">
  </div>
</div>

<div class="search-wrap">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<input id="search" placeholder="Cari produk...">
</div>

<div id="produk" class="container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="modal.style.display='none'">&times;</span>

<img id="mFoto">
<h2 id="mNama"></h2>
<h3 id="mHarga"></h3>
<div id="mKategori"></div>
<div id="mSpek"></div>

<!-- BUTTON SHARE & COPY -->
<div class="action-btn">
  <button onclick="sharePage(this)" class="btn">
    🔗
  </button>

  <button onclick="copyLink(this)" class="btn">
    📋
  </button>
</div>

</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";

let semuaProduk=[];

const foto=f=>"images/"+f;

const rupiah=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n||0);

async function loadProduk(){
 const res=await fetch(API_URL);
 const data=await res.json();

 semuaProduk=data.produk||[];
 tampilkan(semuaProduk);
}

function tampilkan(data){
 produk.innerHTML="";

 data.forEach(p=>{
 produk.innerHTML+=`
 <div class="card" onclick='detail(${JSON.stringify(p)})'>
   <img src="${foto(p.foto)}">
   <div class="card-body">
     <div class="brand">${p.brand||""}</div>
     <div class="tipe">${p.tipe||""}</div>
     <div class="harga">${rupiah(p.harga)}</div>
   </div>
 </div>`;
 });
}

function detail(p){
 modal.style.display="block";

 mFoto.src=foto(p.foto);
 mNama.innerHTML=(p.brand||"")+" "+(p.tipe||"");
 mHarga.innerHTML=rupiah(p.harga);
 mKategori.innerHTML="Kategori: "+(p.kategori||"-");

 mSpek.innerHTML=[p.spek1,p.spek2,p.spek3,p.spek4,p.spek5]
 .filter(Boolean)
 .map(x=>"✅ "+x)
 .join("<br>");
}

/* SHARE */
function sharePage(btn){
 const url=location.href;

 if(navigator.share){
   navigator.share({url});
 }else{
   navigator.clipboard.writeText(url);
 }

 flash(btn);
}

/* COPY */
function copyLink(btn){
 navigator.clipboard.writeText(location.href);
 flash(btn);
}

/* EFFECT */
function flash(btn){
 btn.classList.add("active");
 setTimeout(()=>btn.classList.remove("active"),800);
}

/* SEARCH */
search.addEventListener("keyup",function(){
 const k=this.value.toLowerCase();
 tampilkan(semuaProduk.filter(p=>
   (p.brand||"").toLowerCase().includes(k) ||
   (p.tipe||"").toLowerCase().includes(k)
 ));
});

loadProduk();
</script>

<footer class="footer">
© UFO Kebonsari Malang • 2020-2026
</footer>

</body>
</html>
