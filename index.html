<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO Kebonsari Malang</title>
<meta name="description" content="Katalog Produk UFO Kebonsari Malang">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:#f4f6f9}

#promoBanner{display:none}

/* HEADER */
.header{
  background:#0077c8;
  text-align:center;
  margin:0;
  padding:0;
}

.header-banner img{
  width:100%;
  display:block;
  border-radius:0 0 18px 18px;
}

/* SEARCH */
.search-wrap{
  display:flex;
  gap:10px;
  padding:12px;
  background:#0077c8;
  position:sticky;
  top:0;
  z-index:50;
}

.menu-btn{width:48px;border:none;border-radius:12px}
#search{flex:1;padding:12px;border:none;border-radius:30px}

/* ================= KATEGORI MODERN ================= */
#kategoriBar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:12px 10px;
  background:#fff;
  white-space:nowrap;
  scrollbar-width:none;
}

#kategoriBar::-webkit-scrollbar{display:none}

#kategoriBar button{
  flex:0 0 auto;
  padding:10px 16px;
  border:none;
  border-radius:999px;
  background:#f1f5f9;
  color:#334155;
  font-weight:600;
  font-size:13px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
  cursor:pointer;
  transition:0.2s;
}

#kategoriBar button:hover{
  transform:translateY(-1px);
}

#kategoriBar button.active{
  background:linear-gradient(135deg,#0077c8,#00a6ff);
  color:#fff;
}

/* GRID */
.container{
  padding:8px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

@media(min-width:768px){
  .container{grid-template-columns:repeat(4,1fr)}
}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.card-body{padding:8px}

.brand{
  display:inline-block;
  background:#eef6ff;
  color:#0077c8;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
}

.tipe{font-weight:600;margin-top:8px}
.harga{color:#e11d48;font-size:20px;font-weight:700}

.status,.unggulan{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  margin:2px;
}

.baru{background:#dbeafe;color:#2563eb}
.promo{background:#fee2e2;color:#dc2626}
.best{background:#fef3c7;color:#d97706}
.unggulan{background:#fff7ed;color:#ea580c}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:#fff;overflow:auto;z-index:9999}
.modal-content{padding:20px}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  color:#666;
  font-size:13px;
}
</style>
</head>

<body>

<!-- SIDE MENU (TETAP ASLI) -->
<div id="sideMenu">
<div style="padding:20px;font-weight:700">KATALOG UFO KEBONSARI</div>
<div class="menu-item" onclick="showHome()">🏠 Beranda</div>
<div class="menu-item" onclick="showPromo()">🔥 Promo Bulan Ini</div>
<div class="menu-item" onclick="showUnggulan()">⭐ Produk Unggulan</div>
<div class="menu-item" onclick="hubungiKami()">📞 Hubungi Kami</div>
<div class="menu-item" onclick="showTentang()">🏪 Tentang Toko</div>
<div id="brandList"></div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-banner">
    <img src="images/header-ufo.png">
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<input id="search" placeholder="Cari produk...">
</div>

<!-- KATEGORI BAR (FIXED) -->
<div id="kategoriBar">
  <button onclick="filterKategori('SEMUA',this)" class="active">🏠 Semua</button>
  <button onclick="filterKategori('HP',this)">📱 HP</button>
  <button onclick="filterKategori('LAPTOP',this)">💻 Laptop</button>
  <button onclick="filterKategori('ELEKTRONIK',this)">📺 Elektronik</button>
  <button onclick="filterKategori('DAPUR',this)">🍳 Dapur</button>
</div>

<div id="bannerArea"></div>
<div id="produk" class="container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="modal.style.display='none'">&times;</span>
<img id="mFoto">
<h2 id="mNama"></h2>
<h3 id="mHarga"></h3>
<div id="mKategori"></div>
<div id="mSpek"></div>
<button id="shareBtn">📤 Bagikan Produk</button>
</div>
</div>

<a id="floatingWA" class="floating-wa">💬</a>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";

let semuaProduk=[],settingData={},bannerData=[];

const foto=f=>"https://ufokebonsarimalang.github.io/KATALOGUFOKEBONSARI/images/"+f;
const rupiah=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n||0);

/* LOAD */
async function loadProduk(){
const res=await fetch(API_URL);
const data=await res.json();

semuaProduk=data.produk||[];
settingData=data.setting||{};
bannerData=data.banner||[];

tampilkan(semuaProduk);
}
loadProduk();

/* RENDER */
function tampilkan(data){
produk.innerHTML="";
data.forEach(p=>{
produk.innerHTML+=`
<div class="card">
<img src="${foto(p.foto)}">
<div class="card-body">
<div class="brand">${p.brand||""}</div>
<div class="tipe">${p.tipe||""}</div>
<div class="harga">${rupiah(p.harga)}</div>
</div>
</div>`;
});
}

/* FILTER KATEGORI FIX */
function filterKategori(k,el){

document.querySelectorAll("#kategoriBar button")
.forEach(b=>b.classList.remove("active"));

if(el) el.classList.add("active");

if(k==="SEMUA"){
tampilkan(semuaProduk);
return;
}

tampilkan(semuaProduk.filter(p=>
String(p.kategori||"").toUpperCase()===k
));
}

/* MENU */
function toggleMenu(){sideMenu.style.left="0"}
function closeMenu(){sideMenu.style.left="-300px"}

</script>

<div class="footer">© UFO Kebonsari Malang</div>
</body>
</html>
