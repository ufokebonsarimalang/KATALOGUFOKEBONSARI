<style>

.header{

.header img{
width:80px;

.search-box{

}

.container{

.card{

}

.tipe{

margin-top:5px;
}

.harga{

font-weight:bold;
margin-top:8px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:9999;
overflow:auto;
}

.modal-content{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

.modal img{
width:100%;
border-radius:10px;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}

.spek div{

}

.wa{
display:block;
background:#25D366;

padding:12px;

}
