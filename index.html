<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Elektronik - Katalog Produk</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.search-box{
padding:10px;
background:white;
position:sticky;
top:0;
z-index:10;
}

#search{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.brand{
font-size:12px;
color:#666;
}

.tipe{
font-weight:bold;
margin-top:5px;
}

.harga{
color:#e11d48;
font-weight:bold;
margin-top:8px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:9999;
overflow:auto;
}

.modal-content{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}

.modal img{
width:100%;
border-radius:10px;
}

.close{
float:right;
font-size:25px;
cursor:pointer;
}

.spek div{
padding:4px 0;
}

.wa{
display:block;
background:#25D366;
color:white;
text-align:center;
padding:12px;
margin-top:15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>UFO KEBONSARI MALANG</h1>
<p>Katalog Produk</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Cari produk...">
</div>

<div id="produk" class="container"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="tutupModal()">&times;</span>

<img id="mFoto">

<h2 id="mNama"></h2>
<h3 id="mHarga"></h3>

<div id="mKategori"></div>

<div id="mSpek"></div>

<a id="waBtn" class="wa" target="_blank">Tanya WhatsApp</a>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzqDhY5nu8KBLMggsRrDuo9gxcUrEpFrfqhnb6UnDyrpR6KG2aUh46Jk5kliW3xG2yH/exec";

let semuaProduk = [];

function formatRupiah(n){
return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR"}).format(n || 0);
}

function img(file){
return file ? "images/"+file : "";
}

/* ================= LOAD DATA ================= */
async function loadProduk(){

try{

const res = await fetch(API_URL);
const data = await res.json();

semuaProduk = data || [];

render(semuaProduk);

}catch(e){

console.log(e);

document.getElementById("produk").innerHTML =
"<h3 style='text-align:center'>Gagal load data</h3>";

}

}

/* ================= RENDER ================= */
function render(data){

const box = document.getElementById("produk");
box.innerHTML = "";

data.forEach((p,i)=>{

box.innerHTML += `
<div class="card" onclick="detail(${i})">

<img src="${img(p.foto)}">

<div class="card-body">

<div class="brand">${p.brand||""}</div>

<div class="tipe">${p.tipe||""}</div>

<div class="harga">${formatRupiah(p.harga)}</div>

</div>

</div>
`;

});

}

/* ================= DETAIL ================= */
function detail(i){

const p = semuaProduk[i];
if(!p) return;

document.getElementById("modal").style.display="block";

document.getElementById("mFoto").src = img(p.foto);
document.getElementById("mNama").innerText = (p.brand||"")+" "+(p.tipe||"");
document.getElementById("mHarga").innerText = formatRupiah(p.harga);
document.getElementById("mKategori").innerText = "Kategori: "+(p.kategori||"");

let spek="";
[p.spek1,p.spek2,p.spek3,p.spek4,p.spek5].forEach(s=>{
if(s) spek += "<div>✅ "+s+"</div>";
});

document.getElementById("mSpek").innerHTML = spek;
